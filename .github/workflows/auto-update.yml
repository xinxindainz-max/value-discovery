name: 价值发现 · 自动更新

on:
  schedule:
    - cron: "30 22 * * *"   # 6:30 CST
    - cron: "0 2 * * *"     # 10:00 CST
  workflow_dispatch:

concurrency:
  group: auto-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: 抓取热榜数据
        run: python .workbuddy/pipeline/data_fetcher.py --timeout 15 --output .workbuddy/pipeline/data/latest.json

      - name: 抓取股票行情
        run: python .workbuddy/pipeline/stock_fetcher.py

      - name: 更新HTML
        run: python .workbuddy/pipeline/update_html.py

      - name: 提交并推送
        run: |
          git config user.name "价值发现机器人"
          git config user.email "bot@value-discovery.local"
          git add 发现榜.html index.html .workbuddy/pipeline/data/
          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "auto: 数据刷新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
            echo "已推送"
          fi
