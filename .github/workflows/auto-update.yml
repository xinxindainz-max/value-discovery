name: 价值发现 · 自动更新

on:
  schedule:
    - cron: "30 22 * * *"    # 6:30 CST (UTC+8)
    - cron: "0 2 * * *"      # 10:00 CST (UTC+8)
  workflow_dispatch:           # 手动触发

concurrency:
  group: auto-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    permissions:
      contents: write

    steps:
      # ----------------------------------------------------------
      # Step 0: 检出代码
      # ----------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install --quiet requests

      # ----------------------------------------------------------
      # Step 1: 自愈预检
      # ----------------------------------------------------------
      - name: 自愈预检
        id: health
        run: python .workbuddy/pipeline/health_check.py
        continue-on-error: true

      # ----------------------------------------------------------
      # Step 2: 抓取热榜（重试）
      # ----------------------------------------------------------
      - name: 抓取热榜
        id: fetch
        run: python .workbuddy/pipeline/data_fetcher.py --timeout 15 --output .workbuddy/pipeline/data/latest.json

      # ----------------------------------------------------------
      # Step 3: 抓取股票行情（重试）
      # ----------------------------------------------------------
      - name: 抓取股票行情
        id: stocks
        run: python .workbuddy/pipeline/stock_fetcher.py

      # ----------------------------------------------------------
      # Step 4: 更新 HTML
      # ----------------------------------------------------------
      - name: 更新 HTML
        id: update
        run: python .workbuddy/pipeline/update_html.py

      # ----------------------------------------------------------
      # Step 4.5: 机械卡片更新（信号扫描+源位置+热度标签）
      # ----------------------------------------------------------
      - name: 信号扫描 · 卡片元数据更新
        id: scanner
        run: python .workbuddy/pipeline/card_updater.py
        continue-on-error: true

      # ----------------------------------------------------------
      # Step 5: 运行后验证
      # ----------------------------------------------------------
      - name: 运行后验证
        id: verify
        run: python .workbuddy/pipeline/verify.py
        continue-on-error: true

      # ----------------------------------------------------------
      # Step 6: 提交推送（有变更时才推送）
      # ----------------------------------------------------------
      - name: 提交推送
        run: |
          git config user.name "价值发现机器人"
          git config user.email "bot@value-discovery.local"
           git add .workbuddy/pipeline/data/
          if git diff --cached --quiet; then
            echo "无变更，跳过推送"
          else
            git commit -m "auto: 数据刷新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
            echo "已推送 · GitHub Pages 将自动部署"
          fi
