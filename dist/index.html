<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价值发现 · 社会套利雷达</title>
<style>
  :root {
    --bg: #f7f5f0;
    --card: #fff;
    --tx: #1a1a2e;
    --tx2: #3d3d5c;
    --tx3: #6b6b80;
    --accent: #2c5aa0;
    --border: #e0ddd6;
    --up: #c0392b;
    --dn: #1a7a3a;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,.06);
    --mono: "SF Mono","Cascadia Code","Consolas",monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--tx);
    line-height: 1.6;
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Header */
  .hdr { margin-bottom: 16px; }
  .hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .hdr .sub { font-size: 13px; color: var(--tx3); margin-top: 2px; }
  .hdr .ts { font-size: 11px; color: var(--tx3); margin-top: 6px; font-family: var(--mono); }

  /* Source bar */
  .src-bar { margin-bottom: 14px; }
  .src-bar .lbl { font-size: 12px; color: var(--tx2); margin-bottom: 6px; }
  .src-grid { display: flex; flex-wrap: wrap; gap: 4px; }
  .src-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; border: 1px solid var(--border); }
  .src-ok { background: #e8efeb; color: #1a6b3a; border-color: #c8e6c9; }
  .src-fail { background: #fdf2f0; color: #c0392b; border-color: #f0c8c0; }

  /* Thermo */
  .thermo { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--border); }
  .thermo h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .tgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media(max-width:600px){ .tgrid { grid-template-columns: 1fr; } }
  .tcol-lbl { font-size: 11px; font-weight: 600; color: var(--tx3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .titem { font-size: 12px; line-height: 1.5; padding: 3px 0; }
  .thot { color: var(--up); }
  .tcool { color: var(--dn); }
  .tval { font-size: 12px; line-height: 1.5; color: var(--tx2); }
  .tcross { font-size: 12px; padding: 6px 10px; border-radius: var(--radius-sm); margin-top: 8px; line-height: 1.5; }
  .tcross-opp { background: #e8efeb; color: #1a6b3a; }
  .tcross-dgr { background: #fdf2f0; color: var(--up); }
  .tnote { font-size: 11px; color: var(--tx3); margin-top: 6px; font-style: italic; }

  /* Zone header */
  .zone-hdr { display: flex; align-items: center; gap: 8px; margin: 18px 0 10px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .zone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .zdot-early { background: var(--dn); }
  .zdot-season { background: #c0a050; }
  .zdot-priced { background: var(--up); }
  .zone-hdr h2 { font-size: 15px; font-weight: 700; }
  .zone-desc { font-size: 12px; color: var(--tx3); }
  .zone-cnt { font-size: 12px; color: var(--tx3); margin-left: auto; }

  /* Card */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
  .card-inner { padding: 14px 16px 10px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .tag-ind { font-size: 11px; padding: 1px 7px; border-radius: 3px; font-weight: 600; }
  .ind-ac { background: #e8efeb; color: #1a6b3a; }
  .ind-ai { background: #e8eaf6; color: #283593; }
  .ind-ecom { background: #faf3e0; color: #8a6d1b; }
  .ind-chip { background: #fce8e8; color: #c0392b; }
  .tag-stage { font-size: 11px; padding: 1px 7px; border-radius: 3px; font-weight: 500; }
  .stage-early { background: #e8efeb; color: #1a6b3a; }
  .stage-season { background: #faf3e0; color: #8a6d1b; }
  .stage-priced { background: #fce8e8; color: #c0392b; }
  .tag-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
  .badge-new { background: #e8eaf6; color: #283593; }
  .badge-cont { background: #fce8e8; color: #c0392b; }
  .tag-accel { font-size: 11px; padding: 1px 7px; border-radius: 3px; }
  .accel-new { background: #e8efeb; color: #1a6b3a; }
  .accel-flat { background: #faf3e0; color: #8a6d1b; }
  .tag-season { font-size: 11px; padding: 1px 7px; border-radius: 3px; background: #faf3e0; color: #8a6d1b; }
  .crowding-tag { font-size: 11px; padding: 1px 7px; border-radius: 3px; font-weight: 600; }
  .crowd-0 { background: #e8efeb; color: #1a6b3a; }
  .crowd-2 { background: #eee; color: #999; }

  .card-hl { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 5px; }
  .card-hl .diff { font-size: 11px; color: var(--tx3); font-weight: 400; }
  .card-meta { font-size: 12px; color: var(--tx2); margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .src-pill { font-size: 11px; padding: 1px 6px; border-radius: 3px; background: #faf9f6; color: var(--tx2); }
  .heat-burst { color: var(--up); font-weight: 600; margin-left: auto; font-size: 12px; }
  .heat-steady { color: var(--tx3); font-size: 12px; }

  .card-ol { font-size: 13px; font-weight: 600; line-height: 1.4; margin: 6px 0; padding: 6px 14px; background: #faf9f6; border-radius: 4px; }
  .card-logic { font-size: 12px; color: var(--tx2); line-height: 1.45; padding: 0 14px; margin-bottom: 6px; }
  .card-logic strong { color: var(--tx); font-weight: 600; }

  .card-foot { padding: 6px 16px; font-size: 11px; color: var(--tx2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 4px; }
  .ai-note { font-size: 11px; color: var(--tx3); padding: 5px 16px; background: #faf9f6; font-style: italic; line-height: 1.4; }

  .red-warn { padding: 5px 16px; background: #fdf2f0; color: var(--up); font-size: 12px; font-weight: 600; border-top: 1px solid #f0c8c0; }

  /* Empty state */
  .empty-zone { text-align: center; padding: 20px; color: var(--tx3); font-size: 13px; }

  /* Footer */
  .ft { text-align: center; font-size: 11px; color: var(--tx3); margin-top: 24px; padding: 10px; border-top: 1px solid var(--border); line-height: 1.5; }
</style>
</head>
<body>

<div class="hdr">
  <h1>价值发现</h1>
  <div class="sub">社会套利雷达 · Chris Camillo 中国版</div>
  <div class="ts" id="head-ts">数据加载中...</div>
</div>

<div id="app">
  <div class="empty-zone">加载中...</div>
</div>

<div class="ft" id="ft">
  生成时间 <span id="gen-time">—</span> · <span id="src-note">—</span>
</div>

<script>
(function() {
  var container = document.getElementById('app');

  fetch('data/discovery_board.json?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      render(data);
      updateMeta(data);
    })
    .catch(function(err) {
      container.innerHTML = '<div class="empty-zone">无法加载数据，请检查 data/discovery_board.json</div>';
      console.error('Load error:', err);
    });

  function render(data) {
    var thermo = data.thermo || {};
    var zones = data.zones || [];
    var meta = data.meta || {};

    // Update header ts
    document.getElementById('head-ts').textContent = '数据刷新：' + (data.generated_at || '').substring(5, 16).replace('T', ' ') + ' CST · 自动化管道';

    // Build HTML
    var html = '';

    // ── Source bar (static for now) ──
    html += '<div class="src-bar"><div class="lbl">数据源状态 · 实时抓取 · ' + (meta.data_time || '—') + ' · <span style="color:#1a7a3a">' + (meta.sources_online || '?') + '源在线</span></div>' +
      '<div class="src-grid">' +
      '<span class="src-tag src-ok">微博热搜</span>' +
      '<span class="src-tag src-ok">百度热搜</span>' +
      '<span class="src-tag src-ok">知乎热榜</span>' +
      '<span class="src-tag src-ok">抖音总榜</span>' +
      '<span class="src-tag src-ok">B站全站日榜</span>' +
      '<span class="src-tag src-ok">微信热文</span>' +
      '<span class="src-tag src-ok">今日头条</span>' +
      '<span class="src-tag src-ok">什么值得买</span>' +
      '<span class="src-tag src-ok">小红书</span>' +
      '<span class="src-tag src-ok">快手</span>' +
      '<span class="src-tag src-ok">Google Trends</span>' +
      '<span class="src-tag src-ok">X/Twitter 热门</span>' +
      '</div></div>';

    // ── Thermometer ──
    html += '<div class="thermo"><h3>市场温度计</h3><div class="tgrid">';
    html += '<div><div class="tcol-lbl">升温 Top3</div>';
    (thermo.heating || []).forEach(function(item) {
      html += '<div class="titem thot">' + item.rank + '. ' + esc(item.text) + '</div>';
    });
    html += '</div><div><div class="tcol-lbl">降温 Top3</div>';
    (thermo.cooling || []).forEach(function(item) {
      html += '<div class="titem tcool">' + item.rank + '. ' + esc(item.text) + '</div>';
    });
    html += '</div><div><div class="tcol-lbl">板块估值</div>';
    var sv = thermo.sector_valuation || {};
    html += '<div class="tval">' + esc(sv.name || '') + ' PE-TTM ' + (sv.pe || '—') + 'x<br>5年分位 ' + (sv.percentile_5y || '—') + '% · 中等偏低<br><span style="font-size:11px;color:var(--tx3)">' + esc(sv.note || '') + '</span></div>';
    html += '</div></div>';
    if (thermo.cross_opportunity) html += '<div class="tcross tcross-opp">' + esc(thermo.cross_opportunity) + '</div>';
    if (thermo.cross_danger) html += '<div class="tcross tcross-dgr">' + esc(thermo.cross_danger) + '</div>';
    if (thermo.crowded_consensus) html += '<div class="tnote">' + esc(thermo.crowded_consensus) + '</div>';
    html += '</div>';

    // ── Zones ──
    zones.forEach(function(zone) {
      html += '<div class="zone-hdr"><div class="zone-dot zdot-' + zone.id + '"></div><h2>' + esc(zone.label) + '</h2>' +
        '<span class="zone-desc">' + esc(zone.desc) + '</span>' +
        '<span class="zone-cnt">' + (zone.cards ? zone.cards.length : 0) + ' 信号</span></div>';

      if (!zone.cards || !zone.cards.length) {
        html += '<div class="empty-zone">暂无信号</div>';
        return;
      }

      zone.cards.forEach(function(card) {
        html += buildCard(card);
      });
    });

    container.innerHTML = html;
  }

  function buildCard(card) {
    var tags = card.tags || {};
    var html = '<div class="card">';

    // Tags
    html += '<div class="card-inner"><div class="card-tags">';
    if (tags.industry) html += '<span class="tag-ind ind-' + (tags.industry.indexOf('机器人') >= 0 ? 'ai' : tags.industry.indexOf('芯片') >= 0 ? 'chip' : tags.industry.indexOf('教育') >= 0 ? 'ecom' : 'ac') + '">' + esc(tags.industry) + '</span>';
    if (tags.stage) html += '<span class="tag-stage stage-' + (tags.stage === '早期信号' ? 'early' : tags.stage === '季节性' ? 'season' : 'priced') + '">' + esc(tags.stage) + '</span>';
    if (tags.badge) html += '<span class="tag-badge badge-' + (tags.badge === '新信号' ? 'new' : 'cont') + '">' + esc(tags.badge) + '</span>';
    if (tags.accel) html += '<span class="tag-accel accel-new">' + esc(tags.accel) + '</span>';
    if (tags.seasonal) html += '<span class="tag-season">' + esc(tags.seasonal) + '</span>';
    if (tags.crowding) html += '<span class="crowding-tag crowd-0">拥挤度待算</span>';
    html += '</div>';

    // Headline
    html += '<div class="card-hl">' + esc(card.headline || '') + (card.diffusion ? '<span class="diff"> · 扩散度 ' + esc(card.diffusion) + '</span>' : '') + '</div>';

    // Sources
    html += '<div class="card-meta">';
    (card.sources || []).forEach(function(s) {
      if (s.type === 'pill') html += '<span class="src-pill">' + esc(s.text) + '</span>';
      else if (s.type === 'burst') html += '<span class="heat-burst">' + esc(s.text) + '</span>';
      else if (s.type === 'steady') html += '<span class="heat-steady">' + esc(s.text) + '</span>';
    });
    html += '</div></div>';

    // One-liner
    if (card.one_liner) html += '<div class="card-ol">' + esc(card.one_liner) + '</div>';

    // Red warn
    if (card.red_warn) html += '<div class="red-warn">' + esc(card.red_warn) + '</div>';

    // Logic
    if (card.logic) html += '<div class="card-logic">' + esc(card.logic) + '</div>';

    // Foot
    if (card.foot) html += '<div class="card-foot">' + esc(card.foot) + '</div>';

    // AI note
    if (card.ai_note) html += '<div class="ai-note">' + esc(card.ai_note) + '</div>';

    html += '</div>';
    return html;
  }

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function updateMeta(data) {
    var meta = data.meta || {};
    document.getElementById('gen-time').textContent = (data.generated_at || '').substring(0, 19);
    document.getElementById('src-note').textContent = (meta.note || '').substring(0, 60) + '...';
  }
})();
</script>

</body>
</html>
