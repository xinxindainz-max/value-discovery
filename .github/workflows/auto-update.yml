name: 消费者行为雷达 · 自动更新

on:
  schedule:
    - cron: "0 0 * * *"    # 8:00 CST (UTC+8)
  workflow_dispatch:

concurrency:
  group: radar-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装依赖
        run: pip install --quiet requests

      # Step 1: 抓取国内热榜
      - name: 抓取国内热榜
        run: python .workbuddy/pipeline/data_fetcher.py --timeout 15 --output .workbuddy/pipeline/data/latest.json

      # Step 2: 运行品牌追踪引擎
      - name: 品牌追踪
        run: python .workbuddy/pipeline/brand_tracker.py
        env:
          TRENDSMCP_KEYS: ${{ secrets.TRENDSMCP_KEYS }}
        continue-on-error: true

      # Step 3: 复制数据到公开目录
      - name: 复制数据
        run: |
          mkdir -p data dist/data
          cp .workbuddy/pipeline/data/discovery_board.json data/
          cp .workbuddy/pipeline/data/discovery_board.json dist/data/

      # Step 4: 提交推送
      - name: 提交推送
        run: |
          git config user.name "radar-bot"
          git config user.email "bot@radar.local"
          git add .workbuddy/pipeline/data/ data/ dist/data/
          if git diff --cached --quiet; then
            echo "无变更"
          else
            git commit -m "auto: 雷达刷新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
          fi
