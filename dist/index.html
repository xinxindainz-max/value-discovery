<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消费者行为雷达</title>
<style>
:root{--bg:#f7f5f0;--card:#fff;--tx:#1a1a2e;--tx2:#555;--tx3:#999;--border:#e8e4dc;--up:#c0392b;--down:#1a7a3a;--accent:#1a4a7a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.5}
.container{max-width:900px;margin:0 auto;padding:16px}
.header{text-align:center;padding:16px 0 12px;border-bottom:2px solid var(--border);margin-bottom:12px}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;color:var(--tx3);margin-top:4px}
.header .ts{font-size:11px;color:var(--tx3);margin-top:4px}

.section-title{font-size:15px;font-weight:700;margin:14px 0 6px;padding-left:8px;border-left:3px solid var(--accent)}
.section-title.discovery{border-left-color:var(--tx3)}
.section-desc{font-size:11px;color:var(--tx3);margin-bottom:8px;padding-left:11px}

.brand-card{background:var(--card);border-radius:8px;margin-bottom:8px;padding:10px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.brand-card.active{border-left:3px solid var(--up)}

.brand-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.brand-name{font-size:15px;font-weight:700}
.brand-code{font-size:11px;color:var(--tx3);margin-left:4px;font-family:monospace}
.brand-industry{font-size:10px;color:var(--accent);background:#e8f0fa;padding:2px 7px;border-radius:8px}
.platform-count{font-size:12px;font-weight:700;color:var(--up)}

.platforms{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.plat{font-size:12px;color:var(--tx2)}
.plat .count{font-weight:700;color:var(--tx)}
.plat .count.zero{color:var(--tx3)}
.plat-titles{font-size:10px;color:var(--tx3);font-style:italic;margin-top:2px}

.google-row{font-size:12px;color:var(--tx2);margin-top:4px;padding-top:4px;border-top:1px solid #f5f3ee}
.g-up{color:var(--up);font-weight:600}
.g-dn{color:var(--down);font-weight:600}
.trend-info{font-size:10px;color:var(--tx3);margin-top:2px}

.discovery-list{background:var(--card);border-radius:8px;margin-bottom:8px;padding:8px 14px;border:1px solid var(--border)}
.discovery-item{font-size:12px;color:var(--tx2);padding:3px 0;border-bottom:1px solid #f5f3ee}
.discovery-item:last-child{border-bottom:none}
.discovery-rank{font-size:10px;color:var(--tx3);margin-right:6px;font-family:monospace}

.empty{text-align:center;padding:30px;color:var(--tx3)}
.footer{text-align:center;padding:12px 0;font-size:11px;color:var(--tx3);border-top:1px solid var(--border);margin-top:12px}
.loading{text-align:center;padding:40px;color:var(--tx3)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>消费者行为雷达</h1>
    <div class="sub">15个品牌 × Google Trends + 5个国内平台 · 发现层raw热搜</div>
    <div class="ts" id="head-ts">加载中...</div>
  </div>
  <div id="app"><div class="loading">正在加载...</div></div>
  <div class="footer">数据由 TrendsMCP + data_fetcher 自动抓取 · 不评分不推荐 · 只展示数据</div>
</div>
<script>
(function(){
  var app=document.getElementById('app');
  fetch('data/discovery_board.json?v='+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){render(d)})
    .catch(function(){app.innerHTML='<div class="empty">加载失败</div>'});

  function render(data){
    document.getElementById('head-ts').textContent='更新：'+(data.generated_at||'').substring(5,16).replace('T',' ')+' CST';
    var h='';
    var hist=data.meta&&data.meta.history;
    if(hist)h+='<div class="section-desc">历史：'+hist.date_range+' · '+hist.days+'天 · '+hist.total_records+'条</div>';

    var brands=data.brands||[];
    var active=brands.filter(function(b){return b.platform_count>0});
    var inactive=brands.filter(function(b){return b.platform_count==0});

    if(active.length){h+='<div class="section-title">有提及的品牌</div>';active.forEach(function(b){h+=card(b)})}
    if(inactive.length){h+='<div class="section-title">暂无提及</div>';inactive.forEach(function(b){h+=card(b)})}

    var disc=data.discovery||{};
    var discKeys=Object.keys(disc);
    if(discKeys.length){
      h+='<div class="section-title discovery">发现层 · raw热搜</div>';
      h+='<div class="section-desc">不过滤 · 你扫一眼 · 看到感兴趣的告诉我加品牌</div>';
      discKeys.forEach(function(platform){
        h+='<div class="discovery-list"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(platform)+'</div>';
        (disc[platform]||[]).forEach(function(item){
          h+='<div class="discovery-item"><span class="discovery-rank">'+item.rank+'</span>'+esc(item.title)+'</div>';
        });
        h+='</div>';
      });
    }
    app.innerHTML=h;
  }

  function card(b){
    var cls=b.platform_count>0?'active':'';
    var h='<div class="brand-card '+cls+'">';
    h+='<div class="brand-header"><div><span class="brand-name">'+esc(b.name)+'</span><span class="brand-code">'+esc(b.code)+' · '+esc(b.market)+'</span></div>';
    h+='<div><span class="brand-industry">'+esc(b.industry)+'</span> <span class="platform-count">'+b.platform_count+'/5平台</span></div></div>';

    // 平台提及
    h+='<div class="platforms">';
    var pnames=['抖音总榜','小红书热榜','微博热搜','知乎热榜','百度热搜'];
    pnames.forEach(function(pn){
      var p=(b.platforms||{})[pn]||{count:0};
      var z=p.count>0?'':'zero';
      h+='<span class="plat">'+pn.replace('总榜','').replace('热榜','').replace('热搜','')+': <span class="count '+z+'">'+p.count+'</span></span>';
    });
    h+='</div>';

    // 提及标题
    var titles=[];
    pnames.forEach(function(pn){
      var p=(b.platforms||{})[pn];
      if(p&&p.titles&&p.titles.length)titles=titles.concat(p.titles);
    });
    if(titles.length)h+='<div class="plat-titles">'+titles.map(esc).join(' · ')+'</div>';

    // Google
    var g=b.google;
    if(g){
      var c1=g.growth_1m>0?'g-up':'g-dn',c3=g.growth_3m>0?'g-up':'g-dn';
      h+='<div class="google-row">Google: 1月<span class="'+c1+'">'+(g.growth_1m>0?'+':'')+g.growth_1m+'%</span> · 3月<span class="'+c3+'">'+(g.growth_3m>0?'+':'')+g.growth_3m+'%</span>';
      var t=b.trends||{};
      var days=t.douyin_days||t.抖音_days||0;
      if(days<7&&days>0)h+=' <span style="color:#b85c00">趋势积累中('+days+'/7天)</span>';
      h+='</div>';
    }

    h+='</div>';
    return h;
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
})();
</script>
</body>
</html>
